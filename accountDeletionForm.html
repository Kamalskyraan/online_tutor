<!doctype html>
<html lang="en">
  <head>
    <title>Online Tutor APP Account Deletion Form</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      http-equiv="Content-Security-Policy"
      content="upgrade-insecure-requests"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />
    <link
      rel="icon"
      type="image/png"
      href="https://truckledger.skyraanapps.com/server/static/icon.png"
    />
    <style>
      body {
        font-family: Arial, sans-serif;
        padding: 20px;
      }
      h1 {
        color: #333;
      }
      .place-center {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
      }
    </style>

    <script>
      const apiBaseUrl = "http://tutoraan.com/server/api";
      // const apiBaseUrl = "http://localhost:5011/api";

      function sendOTP() {
        var mobile = document.getElementById("entered_mobile").value.trim();
        var apiUrl = `${apiBaseUrl}/auth/request-otp`;

        // ✅ validation
        // if (!/^[6-9]\d{9}$/.test(mobile)) {
        //   Swal.fire(
        //     "Invalid Mobile",
        //     "Please enter a valid 10-digit mobile number",
        //     "warning",
        //   );
        //   return;
        // }

        $(".sendotp").show();

        fetch(apiUrl, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            country_code: "+91", // ✅ REQUIRED
            mobile: mobile,
            type: "2", // ✅ EXISTING USER (delete/login flow)
          }),
        })
          .then((response) => response.json())
          .then((data) => {
            if (data.success === 0) {
              Swal.fire(
                "Error",
                data.message || "Something went wrong",
                "error",
              );
            } else {
              Swal.fire(
                "OTP Sent",
                `OTP successfully sent to ${mobile}`,
                "success",
              );
            }
          })
          .catch(() => {
            Swal.fire(
              "Network Error",
              "Unable to send OTP. Try again later.",
              "error",
            );
          })
          .finally(() => {
            $(".sendotp").hide();
          });
      }

      async function submitdeletion(e) {
        e.preventDefault();

        var mobile = document.getElementById("entered_mobile").value.trim();
        var otp = document.getElementById("entered_otp").value.trim();
        var reason = document.getElementById("reason").value;

        if (!mobile || !otp) {
          Swal.fire("Error", "Mobile and OTP are required", "warning");
          return;
        }

        const verifyUrl = `${apiBaseUrl}/auth/verify-otp`;
        const deleteUrl = `${apiBaseUrl}/profile/remove-account`;

        try {
          // ✅ STEP 1: Verify OTP
          const verifyRes = await fetch(verifyUrl, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              country_code: "+91",
              mobile: mobile,
              otp: otp,
            }),
          });

          const verifyData = await verifyRes.json();

          if (!verifyRes.ok || verifyData.success === 0) {
            Swal.fire(
              "OTP Error",
              verifyData.message || "Invalid or expired OTP",
              "error",
            );
            return;
          }

          // ✅ STEP 2: Delete Account
          const deleteRes = await fetch(deleteUrl, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              mobile: mobile,
              reasons: reason,
            }),
          });

          const deleteData = await deleteRes.json();

          if (!deleteRes.ok || deleteData.success === 0) {
            Swal.fire(
              "Error",
              deleteData.message || "Failed to delete account",
              "error",
            );
            return;
          }

          // ✅ SUCCESS
          Swal.fire(
            "Account Deleted",
            "Your Online Tutor account is deleted!",
            "success",
          );

          document.getElementById("accdeletionform").reset();
        } catch (error) {
          Swal.fire(
            "Error",
            "Something went wrong! Please try again later.",
            "error",
          );
        }
      }
    </script>
  </head>

  <body>
    <div></div>
    <div id="deletionform">
      <div class="m-2 p-4" style="background: ghostwhite">
        <div class="text-center mb-4">
          <img
            src="https://truckledger.skyraanapps.com/server/static/icon.png"
            width="70"
            alt="logo"
            class="img-fluid my-4"
          />
          <h3 class="fw-bolder">Online Tutor APP Account Deletion Form</h3>
        </div>

        <form id="accdeletionform" onsubmit="submitdeletion(event)">
          <!-- Mobile Input -->
          <span class="fw-bold">Mobile Number</span>
          <div class="mb-3">
            <input
              class="form-control"
              required
              type="tel"
              id="entered_mobile"
              name="mobile"
              placeholder="Enter your 10-digit mobile number"
              pattern="[6-9]{1}[0-9]{9}"
            />
          </div>

          <div class="text-end mt-2">
            <button
              class="btn bg-secondary btn-sm text-white"
              type="button"
              onclick="sendOTP()"
            >
              Send OTP
            </button>
            <button
              class="btn bg-secondary btn-sm text-white sendotp"
              type="button"
              disabled
              style="display: none"
            >
              <span class="spinner-border spinner-border-sm"></span>
              <span class="visually-hidden">Loading...</span>
            </button>
          </div>

          <!-- OTP Input -->
          <span class="fw-bold">OTP</span>
          <div class="mb-3">
            <input
              class="form-control"
              type="text"
              id="entered_otp"
              name="otp"
              placeholder="Enter OTP"
              required
            />
          </div>

          <!-- Reason Dropdown -->

          <span class="fw-bold">Reason</span>
          <div class="mb-3">
            <select class="form-select" required id="reason" name="reason">
              <option value="">Select a reason</option>
              <option value="I no longer need the service">
                I no longer need the service
              </option>
              <option value="Found an alternative platform">
                Found an alternative platform
              </option>
              <option value="Not getting enough responses">
                Not getting enough responses
              </option>
              <option value="Facing technical issues">
                Facing technical issues
              </option>
              <option value="Concerns about privacy">
                Concerns about privacy
              </option>
              <option value="Difficulty using the app">
                Difficulty using the app
              </option>
              <option value="Irrelevant tutors/students">
                Irrelevant tutors/students
              </option>
              <option value="Too many notifications">
                Too many notifications
              </option>
              <option value="Poor experience with users">
                Poor experience with users
              </option>
              <option value="Other reason">Other reason</option>
            </select>
          </div>

          <div class="text-center">
            <button
              class="btn col-12 text-white"
              style="background-color: #4285f4"
              type="submit"
            >
              Submit
            </button>
          </div>
        </form>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
