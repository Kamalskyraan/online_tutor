<!doctype html>
<html lang="en">
  <head>
    <title>Online Tutor APP Account Deletion Form</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      http-equiv="Content-Security-Policy"
      content="upgrade-insecure-requests"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />
    <link
      rel="icon"
      type="image/png"
      href="https://truckledger.skyraanapps.com/server/static/icon.png"
    />
    <style>
      body {
        font-family: Arial, sans-serif;
        padding: 20px;
      }
      h1 {
        color: #333;
      }
      .place-center {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
      }
    </style>

    <script>
      const apiBaseUrl = "http://truckledger.skyraanapps.com/server/api";
      // const apiBaseUrl = "http://localhost:5011/api";
      function sendOTP() {
        var mobile = document.getElementById("entered_mobile").value;
        var apiUrl = `${apiBaseUrl}/auth/otp-request`;

        if (!/^[6-9]\d{9}$/.test(mobile)) {
          Swal.fire(
            "Invalid Mobile",
            "Please enter a valid 10-digit mobile number",
            "warning",
          );
          return;
        }

        $(".sendotp").show();

        fetch(apiUrl, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ mobile: mobile }),
        })
          .then((response) => response.json())
          .then((data) => {
            if (data.result === 0) {
              Swal.fire(
                "Error",
                data.message || "Something went wrong",
                "error",
              );
            } else {
              Swal.fire(
                "OTP Sent",
                `OTP successfully sent to ${mobile}`,
                "success",
              );
            }
          })
          .catch((error) => {
            Swal.fire(
              "Network Error",
              "Unable to send OTP. Try again later.",
              "error",
            );
          })
          .finally(() => {
            $(".sendotp").hide();
          });
      }

      function submitdeletion(e) {
        e.preventDefault();
        var mobile = document.getElementById("entered_mobile").value;
        var otp = document.getElementById("entered_otp").value;
        var reason = document.getElementById("reason").value;
        var apiUrl = `${apiBaseUrl}/admin/account-deletion`;

        fetch(apiUrl, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ mobile: mobile, otp: otp, reason: reason }),
        })
          .then(function (response) {
            if (!response.ok) {
              if (response.status === 404) {
                Swal.fire(
                  "Invalid Mobile",
                  "This mobile number is not registered",
                  "warning",
                );
              } else if (response.status === 400) {
                Swal.fire("OTP Error", "Enter a valid OTP", "warning");
              } else {
                throw new Error("Network error");
              }
            } else if (response.status === 200) {
              Swal.fire(
                "Account Deleted",
                "Your Billmkr account is deleted!",
                "success",
              );
              document.getElementById("accdeletionform").reset();
            }
            return response.json();
          })
          .then(function (data) {
            console.log("Account deletion response:", data);
          })
          .catch(function (error) {
            Swal.fire(
              "Error",
              "Something went wrong! Please try again later.",
              "error",
            );
          });
      }
    </script>
  </head>

  <body>
    <div></div>
    <div id="deletionform">
      <div class="m-2 p-4" style="background: ghostwhite">
        <div class="text-center mb-4">
          <img
            src="https://truckledger.skyraanapps.com/server/static/icon.png"
            width="70"
            alt="logo"
            class="img-fluid my-4"
          />
          <h3 class="fw-bolder">Online Tutor APP Account Deletion Form</h3>
        </div>

        <form id="accdeletionform" onsubmit="submitdeletion(event)">
          <!-- Mobile Input -->
          <span class="fw-bold">Mobile Number</span>
          <div class="mb-3">
            <input
              class="form-control"
              required
              type="tel"
              id="entered_mobile"
              name="mobile"
              placeholder="Enter your 10-digit mobile number"
              pattern="[6-9]{1}[0-9]{9}"
            />
          </div>

          <div class="text-end mt-2">
            <button
              class="btn bg-secondary btn-sm text-white"
              type="button"
              onclick="sendOTP()"
            >
              Send OTP
            </button>
            <button
              class="btn bg-secondary btn-sm text-white sendotp"
              type="button"
              disabled
              style="display: none"
            >
              <span class="spinner-border spinner-border-sm"></span>
              <span class="visually-hidden">Loading...</span>
            </button>
          </div>

          <!-- OTP Input -->
          <span class="fw-bold">OTP</span>
          <div class="mb-3">
            <input
              class="form-control"
              type="text"
              id="entered_otp"
              name="otp"
              placeholder="Enter OTP"
              required
            />
          </div>

          <!-- Reason Dropdown -->

          <span class="fw-bold">Reason</span>
          <div class="mb-3">
            <select class="form-select" required id="reason" name="reason">
              <option value="Found_better_tool/service">
                Found better tool/service
              </option>
              <option value="No_longer_needed.">Navigation difficulties</option>
              <option value="Navigation_difficulties">
                Navigation difficulties.
              </option>
              <option value="14">Privacy concerns.</option>
              <option value="15">Limited features.</option>
              <option value="16">Dissatisfied with content.</option>
              <option value="17">Unsuccessful results.</option>
              <option value="18">App crashes/technical issues.</option>
              <option value="19">Poor customer support.</option>
              <option value="20">Others</option>
            </select>
          </div>

          <div class="text-center">
            <button
              class="btn col-12 text-white"
              style="background-color: #4285f4"
              type="submit"
            >
              Submit
            </button>
          </div>
        </form>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
